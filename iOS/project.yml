name: Onboardly-ClientIntake
options:
  bundleIdPrefix: com.shimondeitel.onboardly
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Onboardly-ClientIntake:
    type: application
    platform: iOS
    sources:
      - path: Onboardly-ClientIntake
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.onboardly
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Onboardly-ClientIntake/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Onboardly-ClientIntakeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Onboardly-ClientIntakeTests
      - path: Onboardly-ClientIntake.storekit
    dependencies:
      - target: Onboardly-ClientIntake
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.onboardly.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Onboardly-ClientIntakeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Onboardly-ClientIntakeUITests
    dependencies:
      - target: Onboardly-ClientIntake
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.onboardly.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Onboardly-ClientIntake:
    build:
      targets:
        Onboardly-ClientIntake: all
        Onboardly-ClientIntakeTests: [test]
        Onboardly-ClientIntakeUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Onboardly-ClientIntake.storekit
    test:
      config: Debug
      storeKitConfiguration: Onboardly-ClientIntake.storekit
      targets:
        - Onboardly-ClientIntakeTests
        - Onboardly-ClientIntakeUITests
    archive:
      config: Release
